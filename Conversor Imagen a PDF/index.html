<!DOCTYPE html>
<html lang="es" class="ion-palette-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes a PDF | Navaja Suiza</title>
    <!-- Ionic -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/palettes/dark.class.css" />
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --ion-color-danger: #ef4444;
            --ion-color-danger-rgb: 239,68,68;
            --ion-color-danger-contrast: #ffffff;
            --ion-color-danger-contrast-rgb: 255,255,255;
            --ion-color-danger-shade: #d23c3c;
            --ion-color-danger-tint: #f15757;
        }
    </style>
    <style>
        .upload-area {
            border: 2px dashed var(--ion-color-medium);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area.dragover {
            border-color: var(--ion-color-danger);
            background: var(--ion-color-light);
        }
        .hidden { display: none !important; }
        .img-preview-card {
            position: relative;
            margin-bottom: 10px;
        }
        .img-preview-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .remove-img-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="danger">
                <ion-buttons slot="start">
                    <ion-button href="../index.html">
                        <ion-icon name="arrow-back"></ion-icon>
                    </ion-button>
                </ion-buttons>
                <ion-title>Imágenes a PDF</ion-title>
                <ion-buttons slot="end">
                    <ion-button id="theme-toggle">
                        <ion-icon name="moon" id="theme-icon"></ion-icon>
                    </ion-button>
                </ion-buttons>
            </ion-toolbar>
        </ion-header>

        <ion-content class="ion-padding">
            <div class="ion-text-center ion-padding-vertical">
                <ion-icon name="images" color="danger" style="font-size: 64px;"></ion-icon>
                <h2>Imágenes a PDF</h2>
                <p>Convierte tus fotos en un solo documento</p>
            </div>

            <!-- Zona de subida -->
            <div class="upload-area" id="upload-area">
                <ion-icon name="cloud-upload-outline" style="font-size: 48px; color: var(--ion-color-medium);"></ion-icon>
                <h3>Sube tus imágenes</h3>
                <p>Haz clic o arrastra JPG/PNG aquí</p>
                <input type="file" id="file-input" multiple accept="image/png, image/jpeg, image/jpg" class="hidden">
            </div>

            <!-- Vista previa de imágenes -->
            <div id="preview-container" class="hidden ion-margin-top">
                <ion-card>
                    <ion-card-header>
                        <ion-row class="ion-align-items-center">
                            <ion-col>
                                <ion-card-title>Seleccionadas (<span id="img-count">0</span>)</ion-card-title>
                            </ion-col>
                            <ion-col size="auto">
                                <ion-button fill="clear" color="medium" id="clear-all-btn">Borrar todo</ion-button>
                            </ion-col>
                        </ion-row>
                    </ion-card-header>
                    <ion-card-content>
                        <ion-grid>
                            <ion-row id="image-grid">
                                <!-- Las imágenes se insertarán aquí dinámicamente -->
                            </ion-row>
                        </ion-grid>
                    </ion-card-content>
                </ion-card>
            </div>

            <!-- Botón de Generar -->
            <ion-button expand="block" color="danger" id="generate-pdf-btn" disabled class="ion-margin-top">
                <ion-icon name="document" slot="start"></ion-icon> Generar PDF
            </ion-button>

        </ion-content>
    </ion-app>

    <!-- Librería jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
    <script src="../main.js"></script>
</body>
</html>
