<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Códigos QR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Generador de QR</h1>
            <p>Ingresa un texto o enlace para crear tu código</p>
        </header>

        <div class="input-section">
            <input type="text" id="qr-text" placeholder="Escribe aquí tu texto o URL..." autocomplete="off" />
            <button id="generate-btn">Generar QR</button>
        </div>

        <div class="qr-section">
            <div id="qr-code"></div>
            <p id="error-msg" class="error hidden">Por favor, ingresa un texto válido.</p>
        </div>
    </div>

    <!-- Incluyendo librería qrcode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
