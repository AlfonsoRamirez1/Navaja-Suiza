<!DOCTYPE html>
<html lang="es" class="ion-palette-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Descuentos | Navaja Suiza</title>
    <!-- Ionic -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/palettes/dark.class.css" />
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --ion-color-warning: #f59e0b;
            --ion-color-warning-rgb: 245,158,11;
            --ion-color-warning-contrast: #ffffff;
            --ion-color-warning-contrast-rgb: 255,255,255;
            --ion-color-warning-shade: #d88b0a;
            --ion-color-warning-tint: #f6a823;
        }
    </style>
</head>
<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="warning">
                <ion-buttons slot="start">
                    <ion-button href="../index.html">
                        <ion-icon name="arrow-back"></ion-icon>
                    </ion-button>
                </ion-buttons>
                <ion-title>Descuentos</ion-title>
                <ion-buttons slot="end">
                    <ion-button id="theme-toggle">
                        <ion-icon name="moon" id="theme-icon"></ion-icon>
                    </ion-button>
                </ion-buttons>
            </ion-toolbar>
        </ion-header>

        <ion-content class="ion-padding">
            <div class="ion-text-center ion-padding-vertical">
                <ion-icon name="pricetag" color="warning" style="font-size: 64px;"></ion-icon>
                <h2>Descuentos</h2>
                <p>Calcula el precio final y tu ahorro total</p>
            </div>

            <ion-card>
                <ion-card-content>
                    <ion-item>
                        <ion-icon name="cash-outline" slot="start"></ion-icon>
                        <ion-input label="Precio Original" label-placement="floating" type="number" id="originalPrice" placeholder="0.00" min="0" step="0.01"></ion-input>
                    </ion-item>

                    <div class="ion-padding-top">
                        <ion-label color="medium" class="ion-padding-horizontal">Descuentos a aplicar (%)</ion-label>
                        <ion-list id="discounts-container">
                            <!-- Los inputs de descuento irán aquí -->
                        </ion-list>
                    </div>

                    <ion-button fill="clear" id="add-discount-btn" expand="block">
                        <ion-icon name="add" slot="start"></ion-icon> Añadir descuento extra
                    </ion-button>
                </ion-card-content>
            </ion-card>

            <ion-card color="light">
                <ion-card-content>
                    <ion-row class="ion-align-items-center ion-margin-bottom">
                        <ion-col>
                            <h3 class="ion-no-margin">Ahorro Total</h3>
                            <p class="ion-no-margin" style="font-size: 0.9em; color: var(--ion-color-medium);" id="effective-discount">0% de descuento efectivo</p>
                        </ion-col>
                        <ion-col size="auto" class="ion-text-end">
                            <strong style="color: var(--ion-color-success); font-size: 1.2rem;" id="totalSaved">$0.00</strong>
                        </ion-col>
                    </ion-row>

                    <ion-row class="ion-align-items-center">
                        <ion-col>
                            <h2 class="ion-no-margin">Precio Final</h2>
                            <p class="ion-no-margin" style="font-size: 0.9em; color: var(--ion-color-medium);">a pagar</p>
                        </ion-col>
                        <ion-col size="auto" class="ion-text-end">
                            <strong style="font-size: 1.5rem;" id="finalPrice">$0.00</strong>
                        </ion-col>
                    </ion-row>
                </ion-card-content>
            </ion-card>
        </ion-content>
    </ion-app>

    <script src="app.js"></script>
    <script src="../main.js"></script>
</body>
</html>
