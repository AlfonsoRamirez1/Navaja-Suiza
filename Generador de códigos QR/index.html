<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Códigos QR | Navaja Suiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <div class="icon-container">
                <i class="ph ph-qr-code"></i>
            </div>
            <h1>Generador QR</h1>
            <p>Comparte enlaces al instante</p>
        </header>

        <div class="app-wrapper">
            <div class="input-group">
                <div class="input-header">
                    <label>Texto o Enlace</label>
                </div>
                <div class="input-row has-icon">
                    <i class="ph ph-link currency-icon"></i>
                    <input type="text" id="qr-text" placeholder="https://..." autocomplete="off" />
                </div>
            </div>

            <button id="generate-btn" class="action-btn">
                <i class="ph ph-magic-wand"></i> Generar QR
            </button>

            <div class="qr-section">
                <div id="qr-code"></div>
                <p id="error-msg" class="error hidden">Por favor, ingresa un texto válido.</p>
            </div>
        </div>
    </div>

    <!-- Incluyendo librería qrcode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
