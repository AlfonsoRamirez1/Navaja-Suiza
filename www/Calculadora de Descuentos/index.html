<!DOCTYPE html><html lang="es" data-theme="light"><head>
    <meta name="theme-color" content="#fdfdfd" id="theme-color-meta">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Descuentos | Navaja Suiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=1780211304120">
</head>
<body>
    <header class="app-bar">
        <div class="app-bar-leading">
            <a href="../index.html" class="icon-button"><i class="ph ph-arrow-left"></i></a>
        </div>
        <div class="app-bar-title">Descuentos</div>
        <div class="app-bar-actions">
            <button class="icon-button" id="theme-toggle" aria-label="Cambiar tema">
                <i class="ph ph-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>
    <div class="app-card-wrapper"><div class="content">
        <div class="tool-header">
            <div class="icon-container">
                <i class="ph ph-tag"></i>
            </div>
            <h1>Descuentos</h1>
            <p>Calcula el precio final y tu ahorro total</p>
        </div>

        <div class="app-wrapper">
            <!-- Precio Original -->
            <div class="input-group">
                <div class="input-header">
                    <label>Precio Original</label>
                </div>
                <div class="input-row has-icon">
                    <i class="ph ph-currency-dollar currency-icon"></i>
                    <input type="number" id="originalPrice" placeholder="0.00" min="0" step="0.01">
                </div>
            </div>

            <!-- Descuentos Dinámicos -->
            <div class="discounts-section">
                <div class="discounts-header">
                    <label>Descuentos a aplicar (%)</label>
                </div>
                <div id="discounts-container" class="discounts-container">
                    <!-- Los inputs de descuento irán aquí -->
                </div>
                <button id="add-discount-btn" class="secondary-btn add-btn">
                    <i class="ph ph-plus"></i> Añadir descuento extra
                </button>
            </div>

            <!-- Resultados -->
            <div class="results-card">
                <div class="result-row">
                    <div class="result-label">
                        <h4>Ahorro Total</h4>
                        <p id="effective-discount">0% de descuento efectivo</p>
                    </div>
                    <div class="result-value savings" id="totalSaved">$0.00</div>
                </div>

                <div class="result-row total">
                    <div class="result-label">
                        <h4>Precio Final</h4>
                        <p>a pagar</p>
                    </div>
                    <div class="result-value" id="finalPrice">$0.00</div>
                </div>
            </div>
        </div>
    </div></div>

    
    
    
    

    <script src="app.js"></script>

<script src="../main.js"></script></body></html>
