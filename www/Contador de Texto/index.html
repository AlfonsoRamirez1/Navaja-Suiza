<!DOCTYPE html><html lang="es" data-theme="light"><head>
    <meta name="theme-color" content="#fdfdfd" id="theme-color-meta">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Texto | Navaja Suiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=1780083022400">
</head>
<body>
    <div class="app-card-wrapper"><header class="app-bar">
        <div class="app-bar-leading">
            <a href="../index.html" class="icon-button"><i class="ph ph-arrow-left"></i></a>
        </div>
        <div class="app-bar-title">Contador de Texto</div>
        <div class="app-bar-actions">
            <button class="icon-button" id="theme-toggle" aria-label="Cambiar tema">
                <i class="ph ph-moon" id="theme-icon"></i>
            </button>
        </div>
    </header><div class="content">
        <div class="tool-header">
            <div class="icon-container">
                <i class="ph ph-text-t"></i>
            </div>
            <h1>Contador de Texto</h1>
            <p>Mide tus palabras y caracteres</p>
        </div>

        <div class="app-wrapper">
            <!-- Área de texto -->
            <div class="input-group">
                <div class="input-header">
                    <label>Tu texto</label>
                    <button id="clear-btn" class="icon-btn" title="Limpiar texto">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
                <textarea id="text-input" placeholder="Escribe o pega tu texto aquí..." rows="6"></textarea>
            </div>

            <!-- Estadísticas -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="ph ph-text-aa"></i></div>
                    <div class="stat-info">
                        <h3>Palabras</h3>
                        <p id="word-count">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon"><i class="ph ph-hash"></i></div>
                    <div class="stat-info">
                        <h3>Caracteres</h3>
                        <p id="char-count">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon"><i class="ph ph-scissors"></i></div>
                    <div class="stat-info">
                        <h3>Sin espacios</h3>
                        <p id="char-no-spaces-count">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon"><i class="ph ph-paragraph"></i></div>
                    <div class="stat-info">
                        <h3>Párrafos</h3>
                        <p id="paragraph-count">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div></div>

    
    
    
    

    <script src="app.js"></script>

<script src="../main.js"></script></body></html>
