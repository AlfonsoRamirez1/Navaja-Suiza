<!DOCTYPE html><html lang="es" data-theme="light"><head>
    <meta name="theme-color" content="#fdfdfd" id="theme-color-meta">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Propinas | Navaja Suiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=1780211304120">
</head>
<body>
    <header class="app-bar">
        <div class="app-bar-leading">
            <a href="../index.html" class="icon-button"><i class="ph ph-arrow-left"></i></a>
        </div>
        <div class="app-bar-title">Propinas</div>
        <div class="app-bar-actions">
            <button class="icon-button" id="theme-toggle" aria-label="Cambiar tema">
                <i class="ph ph-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>
    <div class="app-card-wrapper"><div class="content">
        <div class="tool-header">
            <div class="icon-container">
                <i class="ph ph-receipt"></i>
            </div>
            <h1>Propinas</h1>
            <p>Divide la cuenta rápido</p>
        </div>

        <div class="calculator-wrapper">
            <!-- Total de la cuenta -->
            <div class="input-group">
                <div class="input-header">
                    <label>Total de la cuenta</label>
                </div>
                <div class="input-row has-icon">
                    <i class="ph ph-currency-dollar currency-icon"></i>
                    <input type="number" id="billTotal" placeholder="0.00" min="0" step="0.01">
                </div>
            </div>

            <!-- Porcentaje de propina -->
            <div class="input-group">
                <div class="input-header">
                    <label>Propina (%)</label>
                    <span id="tipPercentageDisplay" class="value-display">15%</span>
                </div>
                <div class="range-container">
                    <input type="range" id="tipPercentage" min="0" max="30" value="15" step="1">
                </div>
                <div class="tip-presets">
                    <button class="preset-btn" data-tip="0">0%</button>
                    <button class="preset-btn" data-tip="10">10%</button>
                    <button class="preset-btn active" data-tip="15">15%</button>
                    <button class="preset-btn" data-tip="20">20%</button>
                </div>
            </div>

            <!-- Número de personas -->
            <div class="input-group">
                <div class="input-header">
                    <label>Personas</label>
                    <span id="peopleCountDisplay" class="value-display">1</span>
                </div>
                <div class="people-counter">
                    <button id="btnMinus" class="counter-btn"><i class="ph ph-minus"></i></button>
                    <input type="number" id="peopleCount" value="1" min="1" max="100">
                    <button id="btnPlus" class="counter-btn"><i class="ph ph-plus"></i></button>
                </div>
            </div>

            <!-- Resultados -->
            <div class="results-card">
                <div class="result-row">
                    <div class="result-label">
                        <h4>Cuenta</h4>
                        <p>por persona (sin propina)</p>
                    </div>
                    <div class="result-value" id="basePerPerson">$0.00</div>
                </div>

                <div class="result-row">
                    <div class="result-label">
                        <h4>Propina</h4>
                        <p>por persona</p>
                    </div>
                    <div class="result-value" id="tipPerPerson">$0.00</div>
                </div>

                <div class="result-row total">
                    <div class="result-label">
                        <h4>Total final</h4>
                        <p>por persona</p>
                    </div>
                    <div class="result-value" id="totalPerPerson">$0.00</div>
                </div>
            </div>
        </div>
    </div></div>

    
    
    
    

    <script src="app.js"></script>

<script src="../main.js"></script></body></html>
