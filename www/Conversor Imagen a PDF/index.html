<!DOCTYPE html><html lang="es" data-theme="light"><head>
    <meta name="theme-color" content="#fdfdfd" id="theme-color-meta">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imágenes a PDF | Navaja Suiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=1780211304120">
</head>
<body>
    <header class="app-bar">
        <div class="app-bar-leading">
            <a href="../index.html" class="icon-button"><i class="ph ph-arrow-left"></i></a>
        </div>
        <div class="app-bar-title">Imágenes a PDF</div>
        <div class="app-bar-actions">
            <button class="icon-button" id="theme-toggle" aria-label="Cambiar tema">
                <i class="ph ph-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>
    <div class="app-card-wrapper"><div class="content">
        <div class="tool-header">
            <div class="icon-container">
                <i class="ph ph-images"></i>
            </div>
            <h1>Imágenes a PDF</h1>
            <p>Convierte tus fotos en un solo documento</p>
        </div>

        <div class="app-wrapper">
            <!-- Zona de subida (Drag & Drop) -->
            <div class="upload-area" id="upload-area">
                <i class="ph ph-upload-simple"></i>
                <h3>Sube tus imágenes</h3>
                <p>Haz clic o arrastra JPG/PNG aquí</p>
                <input type="file" id="file-input" multiple="" accept="image/png, image/jpeg, image/jpg" class="hidden-input">
            </div>

            <!-- Vista previa de imágenes -->
            <div class="preview-container hidden" id="preview-container">
                <div class="preview-header">
                    <h4>Imágenes seleccionadas (<span id="img-count">0</span>)</h4>
                    <button id="clear-all-btn" class="text-btn">Borrar todo</button>
                </div>
                <div class="image-grid" id="image-grid">
                    <!-- Las imágenes se insertarán aquí dinámicamente -->
                </div>
            </div>

            <!-- Botón de Generar -->
            <button id="generate-pdf-btn" class="action-btn" disabled="">
                <i class="ph ph-file-pdf"></i> Generar PDF
            </button>
        </div>
    </div></div>

    
    
    
    

    <!-- Librería jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>

<script src="../main.js"></script></body></html>
