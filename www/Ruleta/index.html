<!DOCTYPE html><html lang="es" data-theme="light"><head>
    <meta name="theme-color" content="#fdfdfd" id="theme-color-meta">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Aleatorio | Navaja Suiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=1780083022400">
</head>
<body>
    <div class="app-card-wrapper"><header class="app-bar">
        <div class="app-bar-leading">
            <a href="../index.html" class="icon-button"><i class="ph ph-arrow-left"></i></a>
        </div>
        <div class="app-bar-title">Sorteo Rápido</div>
        <div class="app-bar-actions">
            <button class="icon-button" id="theme-toggle" aria-label="Cambiar tema">
                <i class="ph ph-moon" id="theme-icon"></i>
            </button>
        </div>
    </header><div class="content">
        <div class="tool-header">
            <div class="icon-container">
                <i class="ph ph-shuffle"></i>
            </div>
            <h1>Sorteo Rápido</h1>
            <p>Deja que el azar decida por ti</p>
        </div>

        <div class="app-wrapper">
            <!-- Zona del resultado -->
            <div class="result-container" id="result-container">
                <div class="winner-label hidden" id="winner-label">¡Tenemos un ganador!</div>
                <div class="result-display" id="result-display">
                    <span class="placeholder-text">Ingresa opciones y gira</span>
                </div>
            </div>

            <!-- Controles -->
            <div class="input-group">
                <div class="input-header">
                    <label>Opciones (Una por línea)</label>
                    <button id="clear-btn" class="icon-btn" title="Limpiar lista">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
                <textarea id="options-input" placeholder="Ejemplo:
Pizza
Hamburguesa
Tacos
Sushi" rows="5"></textarea>
                <div class="stats">
                    <span id="options-count">0 opciones ingresadas</span>
                </div>
            </div>

            <button id="spin-btn" class="action-btn primary">
                <i class="ph ph-play"></i> Seleccionar al azar
            </button>
        </div>
    </div></div>

    
    
    
    

    <!-- Librería para un efecto de confeti (opcional, muy vistoso) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>

<script src="../main.js"></script></body></html>
