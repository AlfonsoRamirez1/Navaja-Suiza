<!DOCTYPE html><html lang="es" data-theme="light"><head>
    <meta name="theme-color" content="#fdfdfd" id="theme-color-meta">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades | Navaja Suiza</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css?v=1780211304120">
</head>
<body>
    <header class="app-bar">
        <div class="app-bar-leading">
            <a href="../index.html" class="icon-button"><i class="ph ph-arrow-left"></i></a>
        </div>
        <div class="app-bar-title">Conversor</div>
        <div class="app-bar-actions">
            <button class="icon-button" id="theme-toggle" aria-label="Cambiar tema">
                <i class="ph ph-moon" id="theme-icon"></i>
            </button>
        </div>
    </header>
    <div class="app-card-wrapper"><div class="content">
        <div class="tool-header">
            <div class="icon-container">
                <i class="ph ph-arrows-left-right"></i>
            </div>
            <h1>Conversor</h1>
            <p>Precisión instantánea</p>
        </div>

        <nav class="category-tabs">
            <button class="tab-btn active" data-category="length" title="Longitud">
                <i class="ph ph-ruler"></i> <span class="tab-text">Longitud</span>
            </button>
            <button class="tab-btn" data-category="weight" title="Peso">
                <i class="ph ph-scales"></i> <span class="tab-text">Peso</span>
            </button>
            <button class="tab-btn" data-category="temperature" title="Temperatura">
                <i class="ph ph-thermometer"></i> <span class="tab-text">Temp</span>
            </button>
            <button class="tab-btn" data-category="volume" title="Líquidos / Volumen">
                <i class="ph ph-drop"></i> <span class="tab-text">Líquidos</span>
            </button>
            <button class="tab-btn" data-category="data" title="Almacenamiento de Datos">
                <i class="ph ph-hard-drives"></i> <span class="tab-text">Datos</span>
            </button>
        </nav>

        <div class="converter-wrapper">
            <!-- Grupo Input 1 -->
            <div class="input-group">
                <div class="input-header">
                    <label>De</label>
                </div>
                <div class="input-row">
                    <input type="number" id="input1" placeholder="0" value="1">
                    <div class="custom-select">
                        <select id="unit1">
                            <!-- Las opciones se generarán por JS -->
                        </select>
                        <i class="ph ph-caret-down"></i>
                    </div>
                </div>
            </div>

            <!-- Botón de intercambio -->
            <div class="swap-container">
                <button id="swap-btn" class="swap-btn" title="Intercambiar unidades">
                    <i class="ph ph-arrows-down-up"></i>
                </button>
            </div>

            <!-- Grupo Input 2 -->
            <div class="input-group">
                <div class="input-header">
                    <label>A</label>
                </div>
                <div class="input-row">
                    <input type="number" id="input2" placeholder="0">
                    <div class="custom-select">
                        <select id="unit2">
                            <!-- Las opciones se generarán por JS -->
                        </select>
                        <i class="ph ph-caret-down"></i>
                    </div>
                </div>
            </div>
        </div>
    </div></div>

    
    
    
    
    
    <script src="app.js"></script>

<script src="../main.js"></script></body></html>
