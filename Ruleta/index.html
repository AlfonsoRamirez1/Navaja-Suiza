<!DOCTYPE html>
<html lang="es" class="ion-palette-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector Aleatorio | Navaja Suiza</title>
    <!-- Ionic -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/palettes/dark.class.css" />
    <link rel="stylesheet" href="../style.css">
    <style>
        :root {
            --ion-color-warning: #a855f7;
            --ion-color-warning-rgb: 168,85,247;
            --ion-color-warning-contrast: #ffffff;
            --ion-color-warning-contrast-rgb: 255,255,255;
            --ion-color-warning-shade: #944be9;
            --ion-color-warning-tint: #b166f8;
        }
    </style>
    <style>
        .result-container {
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border-radius: 16px;
            background: var(--ion-color-light);
            margin-bottom: 20px;
        }
        .result-display {
            font-size: 2rem;
            font-weight: bold;
            color: var(--ion-color-dark);
            transition: all 0.3s;
        }
        .result-display.spinning {
            color: var(--ion-color-medium);
            filter: blur(1px);
        }
        .result-display.winner {
            color: var(--ion-color-success);
            font-size: 2.5rem;
            transform: scale(1.1);
        }
        .placeholder-text {
            color: var(--ion-color-medium);
            font-weight: normal;
            font-size: 1.5rem;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="warning">
                <ion-buttons slot="start">
                    <ion-button href="../index.html">
                        <ion-icon name="arrow-back"></ion-icon>
                    </ion-button>
                </ion-buttons>
                <ion-title>Sorteo Rápido</ion-title>
                <ion-buttons slot="end">
                    <ion-button id="theme-toggle">
                        <ion-icon name="moon" id="theme-icon"></ion-icon>
                    </ion-button>
                </ion-buttons>
            </ion-toolbar>
        </ion-header>

        <ion-content class="ion-padding">
            <div class="ion-text-center ion-padding-vertical">
                <ion-icon name="shuffle" color="warning" style="font-size: 64px;"></ion-icon>
                <h2>Sorteo Rápido</h2>
                <p>Deja que el azar decida por ti</p>
            </div>

            <!-- Zona del resultado -->
            <div class="result-container" id="result-container">
                <ion-text color="success" class="hidden" id="winner-label">
                    <h3>¡Tenemos un ganador!</h3>
                </ion-text>
                <div class="result-display" id="result-display">
                    <span class="placeholder-text">Ingresa opciones y gira</span>
                </div>
            </div>

            <ion-card>
                <ion-card-header>
                    <ion-row class="ion-align-items-center">
                        <ion-col>
                            <ion-card-title>Opciones (Una por línea)</ion-card-title>
                        </ion-col>
                        <ion-col size="auto">
                            <ion-button fill="clear" color="danger" id="clear-btn" title="Limpiar lista">
                                <ion-icon name="trash" slot="icon-only"></ion-icon>
                            </ion-button>
                        </ion-col>
                    </ion-row>
                </ion-card-header>
                <ion-card-content>
                    <ion-textarea id="options-input" fill="outline" rows="5" placeholder="Ejemplo:
Pizza
Hamburguesa
Tacos
Sushi"></ion-textarea>
                    
                    <div class="ion-text-center ion-margin-top">
                        <ion-note id="options-count">0 opciones ingresadas</ion-note>
                    </div>

                    <ion-button expand="block" color="warning" id="spin-btn" class="ion-margin-top" disabled>
                        <ion-icon name="play" slot="start"></ion-icon> Seleccionar al azar
                    </ion-button>
                </ion-card-content>
            </ion-card>

        </ion-content>
    </ion-app>

    <!-- Librería para un efecto de confeti (opcional, muy vistoso) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
    <script src="../main.js"></script>
</body>
</html>
